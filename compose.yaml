services:
  postgres:
    image: postgres:15-alpine
    container_name: desafio-postgres
    environment:
      POSTGRES_DB: desafiob2dev
      POSTGRES_USER: desafio
      POSTGRES_PASSWORD: desafio123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desafio -d desafiob2dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: desafio-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: desafio
      RABBITMQ_DEFAULT_PASS: desafio123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desafio-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/desafiob2dev
      SPRING_DATASOURCE_USERNAME: desafio
      SPRING_DATASOURCE_PASSWORD: desafio123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: desafio
      SPRING_RABBITMQ_PASSWORD: desafio123
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: desafio-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  rabbitmq_data: